<svg xmlns="http://www.w3.org/2000/svg" width="300" height="120" viewBox="0 0 300 120">
  <defs>
    <!-- Gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a2bff" />
      <stop offset="100%" stop-color="#c822ff" />
    </linearGradient>
  </defs>

  <!-- Main rounded background -->
  <rect x="0" y="0" width="300" height="120" rx="20" fill="url(#grad)" />

  <!-- Square behind AI -->
  <rect x="20" y="18" width="95" height="84" rx="15" fill="url(#grad)" opacity="0.9" />

  <!-- AI text -->
  <text x="67.5" y="72" text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-size="52" fill="white" font-weight="900">
    AI
  </text>

  <!-- MOCK INTERVIEW -->
  <text x="130" y="55" font-family="Arial Black, sans-serif" font-size="20" fill="white" font-weight="700">
    MOCK
  </text>
  <text x="130" y="83" font-family="Arial Black, sans-serif" font-size="20" fill="white" font-weight="700">
    INTERVIEW
  </text>
</svg>
